steps:
  # Step 1: Build the Docker image from the current directory
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/fintech-bot', '.']

  # Step 2: Push the image to Google Container Registry (GCR)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/fintech-bot']

  # Step 3: Deploy the image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fintech-bot'
      - '--image'
      - 'gcr.io/$PROJECT_ID/fintech-bot'
      - '--region'
      - 'me-west1'
      - '--project'
      - '$PROJECT_ID'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--timeout'
      - '300'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'TELEGRAM_BOT_TOKEN=${_TELEGRAM_BOT_TOKEN},GOOGLE_API_KEY=${_GOOGLE_API_KEY},WEBAPP_URL=${_WEBAPP_URL},API_SECRET_KEY=${_API_SECRET_KEY},ALLOWED_USERS=${_ALLOWED_USERS},FIRESTORE_DATABASE=${_FIRESTORE_DATABASE},ENV=prod'

images:
  - 'gcr.io/$PROJECT_ID/fintech-bot'

substitutions:
  _TELEGRAM_BOT_TOKEN: "MISSING_TOKEN"
  _GOOGLE_API_KEY: "MISSING_API_KEY"
  _WEBAPP_URL: "MISSING_URL"
  _API_SECRET_KEY: "MISSING_SECRET"
  _ALLOWED_USERS: "0"

options:
  logging: CLOUD_LOGGING_ONLY
